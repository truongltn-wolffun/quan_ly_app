<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý License tập trung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .machine-card { margin-bottom: 20px; border-left: 5px solid #0d6efd; }
        .license-required { background-color: #fff3cd; color: #856404; font-weight: bold; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container">
        <h1 class="mb-4">Bảng điều khiển Admin</h1>
        <div id="admin-content">
            <p>Đang tổng hợp dữ liệu từ các máy trạm...</p>
        </div>
    </div>

    <script>
        // Lưu ý: GitHub API cần được gọi để lấy danh sách file trong thư mục reports
        // Thay bằng username/repo của bạn
        const API_URL = "https://api.github.com/repos/truongltn-wolffun/quan_ly_app/contents/reports";

        async function loadReports() {
            try {
                const response = await fetch(API_URL);
                const files = await response.json();
                const container = document.getElementById('admin-content');
                container.innerHTML = '';

                for (let file of files) {
                    if (file.name.endsWith('.json')) {
                        const res = await fetch(file.download_url);
                        const data = await res.json();
                        renderMachine(data, container);
                    }
                }
            } catch (err) {
                console.error("Lỗi tải dữ liệu:", err);
            }
        }

        function renderMachine(data, container) {
            // Lọc ra các app cần license
            const licensedApps = data.apps.filter(app => app.need_license);
            
            let html = `
                <div class="card machine-card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between">
                        <h5 class="mb-0">Máy: ${data.computer_name}</h5>
                        <small class="text-muted">Cập nhật lúc: ${data.last_update}</small>
                    </div>
                    <div class="card-body">
                        <h6>Danh sách phần mềm cần License:</h6>
                        <table class="table table-sm table-bordered">
                            <thead><tr><th>Tên phần mềm</th><th>Nhà phát triển</th></tr></thead>
                            <tbody>
                                ${licensedApps.map(app => `
                                    <tr class="license-required">
                                        <td>${app.name}</td>
                                        <td>${app.publisher}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        }

        loadReports();
    </script>
</body>
</html>
