<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Audit Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .badge-ms { background-color: #0078d4; }
        .badge-ext { background-color: #28a745; }
        .status-warn { color: #d93025; font-weight: bold; }
        .status-ok { color: #1e8e3e; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3">Báo cáo phần mềm máy tính</h1>
                <p class="text-muted">Đang quét máy: {{ request.host }}</p>
            </div>
            <button onclick="exportData()" class="btn btn-primary">Lưu báo cáo JSON</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Tên ứng dụng</th>
                            <th>Nhà phát triển</th>
                            <th>Nguồn</th>
                            <th>Trạng thái dự đoán</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for app in apps %}
                        <tr>
                            <td><strong>{{ app.name }}</strong><br><small class="text-muted">{{ app.location }}</small></td>
                            <td>{{ app.publisher }}</td>
                            <td>
                                <span class="badge {{ 'badge-ms' if app.category == 'Microsoft' else 'badge-ext' }}">
                                    {{ app.category }}
                                </span>
                            </td>
                            <td class="{{ 'status-warn' if 'Nghi vấn' in app.status or 'Crack' in app.status else 'status-ok' }}">
                                {{ app.status }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function exportData() {
            fetch('/export', {method: 'POST'})
            .then(response => response.json())
            .then(data => alert(data.message));
        }
    </script>
</body>
</html>
