<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IT Asset Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded">
        <h1 class="mb-4">Danh sách ứng dụng từ xa</h1>
        <div id="loading">Đang tải dữ liệu...</div>
        <table class="table table-striped" id="appTable" style="display:none;">
            <thead>
                <tr>
                    <th>Tên ứng dụng</th>
                    <th>Nhà phát triển</th>
                    <th>Nguồn</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="appBody"></tbody>
        </table>
    </div>

    <script>
        // Đọc file data.json được đẩy lên cùng repository
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const body = document.getElementById('appBody');
                data.forEach(app => {
                    const row = `<tr>
                        <td>${app.name}</td>
                        <td>${app.publisher}</td>
                        <td>${app.category}</td>
                        <td>${app.status}</td>
                    </tr>`;
                    body.innerHTML += row;
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appTable').style.display = 'table';
            })
            .catch(err => {
                document.getElementById('loading').innerText = 'Chưa có dữ liệu. Vui lòng chạy script ở máy cục bộ và push data.json lên.';
            });
    </script>
</body>
</html>
